services:
  postgres:
    image: postgres:17-alpine
    container_name: titan-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: titan
      POSTGRES_PASSWORD: titan
      POSTGRES_DB: titan
    ports:
      - "5432:5432"
    volumes:
      - titan_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U titan -d titan"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  titan_postgres_data:
